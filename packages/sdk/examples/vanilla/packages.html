<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Packages</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="container">
        <section class="section">
          <!-- Category filter (same as products page) -->
          <div class="categories" id="categories">
            <button class="cat-btn active" id="cat-all">All</button>
          </div>
          <div class="categories subcategories" id="subcategories" style="display: none"></div>

          <div id="packages-container"></div>

          <div class="pagination" id="pagination" style="display: none">
            <button class="page-btn" id="prev-btn">&#8592; Previous</button>
            <span class="page-info" id="page-info"></span>
            <button class="page-btn" id="next-btn">Next &#8594;</button>
          </div>
        </section>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="../../dist/spaceis.global.js"></script>
    <script src="shared.js"></script>
    <script>
      "use strict";

      var state = {
        currentPage: 1,
        currentCategory: null,
        categoriesLoaded: false,
      };

      // ── Categories ────────────────────────────────────────────

      function loadCategories() {
        if (state.categoriesLoaded) return;
        state.categoriesLoaded = true;

        client.categories.list()
          .then(function (categories) {
            var container = document.getElementById("categories");
            categories.forEach(function (cat) {
              if (!cat.is_active) return;
              var btn = document.createElement("button");
              btn.className = "cat-btn";
              btn.textContent = cat.name;
              btn.dataset.uuid = cat.uuid;
              btn.addEventListener("click", function () {
                selectCategory(cat, btn);
              });
              container.appendChild(btn);
            });
          })
          .catch(function () {});
      }

      function selectCategory(cat, btn) {
        state.currentCategory = cat.uuid;
        state.currentPage = 1;

        document.querySelectorAll("#categories .cat-btn").forEach(function (b) {
          b.classList.remove("active");
        });
        if (btn) btn.classList.add("active");

        // Subcategories
        var subContainer = document.getElementById("subcategories");
        subContainer.innerHTML = "";

        var activeChildren = (cat.children || []).filter(function (c) { return c.is_active; });

        if (activeChildren.length > 0) {
          subContainer.style.display = "";

          var allBtn = document.createElement("button");
          allBtn.className = "cat-btn cat-child active";
          allBtn.textContent = "All";
          allBtn.addEventListener("click", function () {
            state.currentCategory = cat.uuid;
            state.currentPage = 1;
            subContainer.querySelectorAll(".cat-btn").forEach(function (b) { b.classList.remove("active"); });
            allBtn.classList.add("active");
            loadPackages();
          });
          subContainer.appendChild(allBtn);

          activeChildren.forEach(function (child) {
            var subBtn = document.createElement("button");
            subBtn.className = "cat-btn cat-child";
            subBtn.textContent = child.name;
            subBtn.addEventListener("click", function () {
              state.currentCategory = child.uuid;
              state.currentPage = 1;
              subContainer.querySelectorAll(".cat-btn").forEach(function (b) { b.classList.remove("active"); });
              subBtn.classList.add("active");
              loadPackages();
            });
            subContainer.appendChild(subBtn);
          });
        } else {
          subContainer.style.display = "none";
        }

        loadPackages();
      }

      document.getElementById("cat-all").addEventListener("click", function () {
        state.currentCategory = null;
        state.currentPage = 1;
        document.querySelectorAll(".cat-btn").forEach(function (b) { b.classList.remove("active"); });
        this.classList.add("active");
        document.getElementById("subcategories").style.display = "none";
        loadPackages();
      });

      // ── Packages ─────────────────────────────────────────────

      function loadPackages() {
        renderSkeletons("packages-container", 6);
        document.getElementById("pagination").style.display = "none";

        var params = { page: state.currentPage };
        if (state.currentCategory) params.category_uuid = state.currentCategory;

        client.packages.list(params)
          .then(function (result) {
            var container = document.getElementById("packages-container");

            if (result.data.length === 0) {
              container.innerHTML = '<div class="empty-state"><p>No packages available.</p></div>';
              return;
            }

            var grid = document.createElement("div");
            grid.className = "products-grid";

            result.data.forEach(function (pkg, idx) {
              var card = document.createElement("div");
              card.className = "product-card";
              card.style.animationDelay = idx * 0.04 + "s";

              var productObj = pkg.shop_product || {};
              var imgHtml = productObj.image
                ? '<img class="product-img" src="' + esc(productObj.image) + '" alt="' + esc(productObj.name) + '" loading="lazy">'
                : '<div class="product-img-placeholder">' + PLACEHOLDER_SVG_LG + '</div>';

              var discountHtml = pkg.percentage_discount
                ? '<div class="product-discount-badge">-' + esc(pkg.percentage_discount) + '%</div>'
                : '';

              var minPrice = pkg.minimal_price != null ? pkg.minimal_price : null;
              var minBasePrice = pkg.minimal_base_price != null ? pkg.minimal_base_price : null;
              var oldHtml = (minBasePrice && minBasePrice !== minPrice)
                ? '<br><span class="product-price-old">' + fp(minBasePrice) + '</span>'
                : '';

              card.innerHTML =
                '<div class="product-img-wrap">' + imgHtml + discountHtml + '</div>' +
                '<div class="product-body">' +
                  '<div class="product-name">' + esc(productObj.name || '') + '</div>' +
                  '<div class="product-footer">' +
                    '<div><span class="product-price">' + (minPrice != null ? fp(minPrice) : '') + '</span>' + oldHtml + '</div>' +
                    '<button class="view-btn">View</button>' +
                  '</div>' +
                '</div>';

              if (productObj.slug) {
                card.addEventListener("click", function () {
                  openProductModal(productObj.slug);
                });
              }

              grid.appendChild(card);
            });

            container.innerHTML = "";
            container.appendChild(grid);
            renderPagination(result.meta);
          })
          .catch(function () {
            document.getElementById("packages-container").innerHTML =
              '<div class="empty-state"><p>Failed to load packages.</p></div>';
          });
      }

      function renderPagination(meta) {
        var pag = document.getElementById("pagination");
        if (!meta || meta.last_page <= 1) { pag.style.display = "none"; return; }
        pag.style.display = "flex";
        document.getElementById("page-info").textContent = meta.current_page + " / " + meta.last_page;
        document.getElementById("prev-btn").disabled = meta.current_page <= 1;
        document.getElementById("next-btn").disabled = meta.current_page >= meta.last_page;
      }

      document.getElementById("prev-btn").addEventListener("click", function () {
        state.currentPage--;
        loadPackages();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      document.getElementById("next-btn").addEventListener("click", function () {
        state.currentPage++;
        loadPackages();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      // ── Init ─────────────────────────────────────────────────

      loadCategories();
      renderSkeletons("packages-container", 6);
      loadPackages();
    </script>
  </body>
</html>
