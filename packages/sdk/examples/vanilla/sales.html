<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Sales</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="container">
        <section class="section">
          <div id="sales-container"><div class="spinner"></div></div>
        </section>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="../../dist/spaceis.global.js"></script>
    <script src="shared.js"></script>
    <script>
      "use strict";

      var countdownTimers = [];

      function pad(n) { return n < 10 ? "0" + n : "" + n; }

      function loadSales() {
        var container = document.getElementById("sales-container");
        renderSkeletons("sales-container", 6);

        countdownTimers.forEach(function (t) { clearInterval(t); });
        countdownTimers = [];

        client.sales.list({ sort: "expires_at" })
          .then(function (result) {
            var sales = result.data || result;

            if (!sales || sales.length === 0) {
              container.innerHTML = '<div class="empty-state"><p>No active sales.</p></div>';
              return;
            }

            var grid = document.createElement("div");
            grid.className = "products-grid";

            sales.forEach(function (sale, idx) {
              var card = document.createElement("div");
              card.className = "product-card";
              card.style.animationDelay = idx * 0.04 + "s";
              card.style.cursor = "pointer";

              var imgHtml = sale.image
                ? '<img class="product-img" src="' + esc(sale.image) + '" alt="' + esc(sale.name) + '" loading="lazy">'
                : '<div class="product-img-placeholder">' + PLACEHOLDER_SVG_LG + '</div>';

              var discountHtml = sale.percentage_discount
                ? '<div class="product-discount-badge">-' + esc(sale.percentage_discount) + '%</div>'
                : '';

              var endsAt = sale.expires_at || sale.ends_at;
              var countdownHtml = endsAt
                ? '<div class="sale-timer" id="sale-timer-' + idx + '"></div>'
                : '';

              card.innerHTML =
                '<div class="product-img-wrap">' + imgHtml + discountHtml + '</div>' +
                '<div class="product-body">' +
                  '<div class="product-name">' + esc(sale.name) + '</div>' +
                  '<div class="product-footer">' +
                    '<div>' +
                      (sale.percentage_discount
                        ? '<span class="product-price" style="color:var(--red)">-' + esc(sale.percentage_discount) + '%</span>'
                        : '') +
                    '</div>' +
                    '<button class="view-btn">View</button>' +
                  '</div>' +
                  countdownHtml +
                '</div>';

              // Click → products filtered by this sale
              card.addEventListener("click", function () {
                window.location.href = "index.html?sale=" + encodeURIComponent(sale.slug || sale.uuid);
              });

              grid.appendChild(card);
            });

            container.innerHTML = "";
            container.appendChild(grid);

            // Countdown timers
            sales.forEach(function (sale, idx) {
              var endsAt = sale.expires_at || sale.ends_at;
              if (!endsAt) return;
              var el = document.getElementById("sale-timer-" + idx);
              if (!el) return;

              function update() {
                var diff = new Date(endsAt).getTime() - Date.now();
                if (diff <= 0) { el.textContent = "Ended"; el.style.color = "var(--txt-3)"; return; }
                var d = Math.floor(diff / 86400000);
                var h = Math.floor((diff % 86400000) / 3600000);
                var m = Math.floor((diff % 3600000) / 60000);
                var s = Math.floor((diff % 60000) / 1000);
                var parts = [];
                if (d > 0) parts.push(d + "d");
                parts.push(pad(h) + ":" + pad(m) + ":" + pad(s));
                el.textContent = parts.join(" ") + " left";
              }

              update();
              countdownTimers.push(setInterval(update, 1000));
            });
          })
          .catch(function () {
            container.innerHTML = '<div class="empty-state"><p>Failed to load sales.</p></div>';
          });
      }

      loadSales();
    </script>
  </body>
</html>
