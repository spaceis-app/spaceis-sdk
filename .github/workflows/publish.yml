name: Publish to npm

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test

      - name: Publish @spaceis/sdk
        working-directory: packages/sdk
        run: pnpm publish --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spaceis/react
        working-directory: packages/react
        run: pnpm publish --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @spaceis/vue
        working-directory: packages/vue
        run: pnpm publish --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-spaceis
        working-directory: packages/create
        run: pnpm publish --access public --no-git-checks || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
