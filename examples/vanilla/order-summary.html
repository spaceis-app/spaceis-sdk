<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Order Summary</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="order-wrapper">
        <!-- Code input -->
        <div id="code-input-section">
          <div class="order-card">
            <div class="order-card-title">Check order</div>
            <p style="color: var(--txt-3); font-size: 13px; margin-bottom: 16px">
              Enter an order code to view its status and details.
            </p>
            <div class="order-input-row">
              <input
                type="text"
                id="order-code-input"
                placeholder="e.g. ABC123DEF"
                autocomplete="off"
              />
              <button id="check-order-btn">Check</button>
            </div>
          </div>
        </div>

        <!-- Order details (hidden until loaded) -->
        <div id="order-details" style="display: none"></div>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@spaceis/sdk@0.1.4/dist/spaceis.global.js"></script>
    <script src="shared.js"></script>
    <script>
      "use strict";

      const statusLabels = {
        pending: "Pending",
        completed: "Completed",
        cancelled: "Cancelled",
      };
      const statusIcons = {
        pending: "&#9203;",
        completed: "&#10003;",
        cancelled: "&#10007;",
      };

      const params = new URLSearchParams(window.location.search);
      const codeFromUrl = params.get("order") || params.get("code");
      if (codeFromUrl) {
        document.getElementById("order-code-input").value = codeFromUrl;
        loadOrder(codeFromUrl);
      }

      document.getElementById("check-order-btn").addEventListener("click", () => {
        const code = document.getElementById("order-code-input").value.trim();
        if (!code) {
          showToast("Enter order code", "error");
          return;
        }
        loadOrder(code);
      });

      document.getElementById("order-code-input").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("check-order-btn").click();
      });

      async function loadOrder(code) {
        const btn = document.getElementById("check-order-btn");
        btn.disabled = true;
        btn.textContent = "...";

        try {
          const order = await client.orders.summary(code);
          renderOrder(order);
          window.history.replaceState(null, "", `order-summary.html?code=${encodeURIComponent(code)}`);
        } catch (err) {
          showToast(getErrorMessage(err), "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Check";
        }
      }

      function renderOrder(order) {
        const detailsEl = document.getElementById("order-details");
        detailsEl.style.display = "";

        const status = order.status || "pending";
        const statusLabel = statusLabels[status] || status;
        const statusIcon = statusIcons[status] || "&#8226;";

        const items = order.items || [];

        // Status alert + code
        let html =
          `<div class="order-alert order-alert-${esc(status)}">` +
            '<div class="order-alert-top">' +
              `<span class="order-alert-label">${esc(statusLabel)}</span>` +
              (order.code ? `<span class="order-alert-code">${esc(order.code)}</span>` : '') +
            '</div>' +
          '</div>';

        // Items
        html += '<div class="order-card"><div class="order-card-title">Order items</div>';

        items.forEach((item) => {
          const imgHtml = item.image
            ? `<img class="order-item-img" src="${esc(item.image)}" alt="">`
            : "";

          html +=
            '<div class="order-item">' +
            imgHtml +
            '<div class="order-item-info">' +
            `<div class="order-item-name">${esc(item.title)}</div>` +
            (item.subtitle ? `<div class="order-item-qty">${esc(item.subtitle)}</div>` : "") +
            `<div class="order-item-qty">Quantity: ${SpaceIS.fromApiQty(item.quantity)}</div>` +
            "</div>" +
            `<div class="order-item-price">${fp(item.final_price)}</div>` +
            "</div>";
        });

        html += "</div>";

        // Totals
        html += '<div class="order-card"><div class="order-card-title">Summary</div>';

        if (order.regular_total_price !== order.final_total_price) {
          html +=
            '<div class="order-total-row">' +
            "<span>Regular price</span>" +
            `<span style="text-decoration:line-through">${fp(order.regular_total_price)}</span>` +
            "</div>";
        }
        if (order.discount?.totalDiscountedValue) {
          html +=
            '<div class="order-total-row discount">' +
            `<span>Discount${order.discount.code ? ` (${esc(order.discount.code)})` : ""}</span>` +
            `<span>-${fp(order.discount.totalDiscountedValue)}</span>` +
            "</div>";
        }
        if (order.sale?.totalDiscountedValue) {
          html +=
            '<div class="order-total-row discount">' +
            "<span>Sale</span>" +
            `<span>-${fp(order.sale.totalDiscountedValue)}</span>` +
            "</div>";
        }
        if (order.package_included?.totalDiscountedValue) {
          html +=
            '<div class="order-total-row discount">' +
            "<span>Package discount</span>" +
            `<span>-${fp(order.package_included.totalDiscountedValue)}</span>` +
            "</div>";
        }
        html +=
          '<div class="order-total-row final">' +
          "<span>Total</span>" +
          `<span>${fp(order.final_total_price)}</span>` +
          "</div>";

        html += "</div>";

        html += '<a class="back-link" href="index.html">&#8592; Back to shop</a>';

        detailsEl.innerHTML = html;
        document.title = `Order ${order.code || ""} — SpaceIS SDK`;
      }
    </script>
  </body>
</html>
