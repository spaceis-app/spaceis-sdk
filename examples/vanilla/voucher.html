<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Voucher</title>
    <meta name="description" content="SpaceIS storefront — redeem your voucher code for rewards.">
    <meta property="og:title" content="SpaceIS SDK — Voucher">
    <meta property="og:type" content="website">
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
        <div class="container voucher-layout">
          <div class="voucher-card">
            <div class="voucher-card-title">Redeem voucher</div>
            <div class="voucher-card-desc">
              Enter your player nickname and voucher code to redeem it.
            </div>

            <div class="voucher-form" id="voucher-form">
              <div class="form-field">
                <label class="form-label" for="voucher-nick">Player nickname *</label>
                <input type="text" id="voucher-nick" placeholder="Steve" autocomplete="off" />
              </div>
              <div class="form-field">
                <label class="form-label" for="voucher-code">Voucher code *</label>
                <input
                  type="text"
                  id="voucher-code"
                  placeholder="ABCD-1234-EFGH"
                  autocomplete="off"
                  style="letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--mono)"
                />
              </div>
              <button class="voucher-submit" id="voucher-submit-btn">Redeem voucher</button>
            </div>

            <div class="result-box" id="voucher-result"></div>
          </div>
        </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@spaceis/sdk@0.1.4/dist/spaceis.global.js" integrity="sha384-DJRxH7IjY+WUtTa16M0CizszmJHmweQTCNXnI6OfFN5q/Vi9ejyqQ7oZ8V1Ouokq" crossorigin="anonymous"></script>
    <script type="module" src="shared/main.js"></script>
    <script>
      "use strict";

      // Preload reCAPTCHA once shared/main.js has exposed `client` on window.
      window.addEventListener("spaceis:ready", () => {
        client.recaptcha.load().catch(() => {});
      });

      document.getElementById("voucher-submit-btn").addEventListener("click", async () => {
        const nick = document.getElementById("voucher-nick").value.trim();
        const code = document.getElementById("voucher-code").value.trim();

        if (!nick) { showToast("Player nickname is required", "error"); return; }
        if (!code) { showToast("Voucher code is required", "error"); return; }

        hideResult("voucher-result");
        const btn = document.getElementById("voucher-submit-btn");
        btn.disabled = true;
        btn.textContent = "Checking...";

        try {
          const token = await client.recaptcha.execute("voucher");
          const result = await client.vouchers.redeem({ nick, code, "g-recaptcha-response": token });
          showResult("voucher-result", result.message || "Voucher redeemed!", "success");
          showToast(result.message || "Voucher redeemed!", "success");
          document.getElementById("voucher-code").value = "";
        } catch (err) {
          const msg = getErrorMessage(err);
          showResult("voucher-result", msg, "error");
          showToast(msg, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Redeem voucher";
        }
      });

      document.getElementById("voucher-code").addEventListener("keydown", (e) => {
        if (e.key === "Enter") document.getElementById("voucher-submit-btn").click();
      });

      function showResult(id, message, type) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = message;
        el.className = `result-box show ${type || ""}`;
      }
      function hideResult(id) {
        const el = document.getElementById(id);
        if (el) el.className = "result-box";
      }
    </script>
  </body>
</html>
