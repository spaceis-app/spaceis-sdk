<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Packages</title>
    <meta name="description" content="SpaceIS storefront — explore available package bundles.">
    <meta property="og:title" content="SpaceIS SDK — Packages">
    <meta property="og:type" content="website">
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.0/dist/purify.min.js"
      integrity="sha384-S/hEiU9V48awIFrhtOYkLWEqSLw7EvRFdJy3fVABLPNP0xU2gavrud66pkpp3f7m"
      crossorigin="anonymous"></script>
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="container">
        <section class="section">
          <!-- Category filter (same as products page) -->
          <div class="categories" id="categories">
            <button class="cat-btn active" id="cat-all">All</button>
          </div>
          <div class="categories subcategories" id="subcategories" style="display: none"></div>

          <div id="packages-container"></div>

          <div class="pagination" id="pagination" style="display: none">
            <button class="page-btn" id="prev-btn">&#8592; Previous</button>
            <span class="page-info" id="page-info"></span>
            <button class="page-btn" id="next-btn">Next &#8594;</button>
          </div>
        </section>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@spaceis/sdk@0.1.4/dist/spaceis.global.js" integrity="sha384-DJRxH7IjY+WUtTa16M0CizszmJHmweQTCNXnI6OfFN5q/Vi9ejyqQ7oZ8V1Ouokq" crossorigin="anonymous"></script>
    <script type="module" src="shared/main.js"></script>
    <script>
      "use strict";

      const state = {
        currentPage: 1,
        currentCategory: null,
        categoriesLoaded: false,
      };

      document.getElementById("cat-all").addEventListener("click", function () {
        state.currentCategory = null;
        state.currentPage = 1;
        document.querySelectorAll(".cat-btn").forEach((b) => { b.classList.remove("active"); });
        this.classList.add("active");
        document.getElementById("subcategories").style.display = "none";
        loadPackages();
      });

      // ── Packages ─────────────────────────────────────────────

      async function loadPackages() {
        renderSkeletons("packages-container", 6);
        document.getElementById("pagination").style.display = "none";

        const params = { page: state.currentPage };
        if (state.currentCategory) params.category_uuid = state.currentCategory;

        try {
          const result = await client.packages.list(params);
          const container = document.getElementById("packages-container");

          if (result.data.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>No packages available.</p></div>';
            return;
          }

          const grid = document.createElement("div");
          grid.className = "products-grid";

          result.data.forEach((pkg, idx) => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.style.animationDelay = `${idx * 0.04}s`;

            const productObj = pkg.shop_product || {};
            const imgHtml = productObj.image
              ? `<img class="product-img" src="${esc(productObj.image)}" alt="${esc(productObj.name)}" loading="lazy">`
              : `<div class="product-img-placeholder">${PLACEHOLDER_SVG_LG}</div>`;

            const discountHtml = pkg.percentage_discount
              ? `<div class="product-discount-badge">-${esc(pkg.percentage_discount)}%</div>`
              : '';

            const minPrice = pkg.minimal_price != null ? pkg.minimal_price : null;
            const minBasePrice = pkg.minimal_base_price != null ? pkg.minimal_base_price : null;
            const oldHtml = (minBasePrice && minBasePrice !== minPrice)
              ? `<br><span class="product-price-old">${fp(minBasePrice)}</span>`
              : '';

            card.innerHTML =
              `<div class="product-img-wrap">${imgHtml}${discountHtml}</div>` +
              '<div class="product-body">' +
                `<div class="product-name">${esc(productObj.name || '')}</div>` +
                '<div class="product-footer">' +
                  `<div><span class="product-price">${minPrice != null ? fp(minPrice) : ''}</span>${oldHtml}</div>` +
                  '<button class="view-btn">View</button>' +
                '</div>' +
              '</div>';

            if (productObj.slug) {
              card.addEventListener("click", () => {
                openProductModal(productObj.slug);
              });
            }

            grid.appendChild(card);
          });

          container.innerHTML = "";
          container.appendChild(grid);
          renderPagination(result.meta);
        } catch {
          document.getElementById("packages-container").innerHTML =
            '<div class="empty-state"><p>Failed to load packages.</p></div>';
        }
      }

      function renderPagination(meta) {
        const pag = document.getElementById("pagination");
        if (!meta || meta.last_page <= 1) { pag.style.display = "none"; return; }
        pag.style.display = "flex";
        document.getElementById("page-info").textContent = `${meta.current_page} / ${meta.last_page}`;
        document.getElementById("prev-btn").disabled = meta.current_page <= 1;
        document.getElementById("next-btn").disabled = meta.current_page >= meta.last_page;
      }

      document.getElementById("prev-btn").addEventListener("click", () => {
        state.currentPage--;
        loadPackages();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
      document.getElementById("next-btn").addEventListener("click", () => {
        state.currentPage++;
        loadPackages();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      // ── Init (after shared/main.js exposes client / renderSkeletons) ─
      window.addEventListener("spaceis:ready", () => {
        initCategories(state, client);
        loadCategories({ onSelect: () => loadPackages() });
        renderSkeletons("packages-container", 6);
        loadPackages();
      });
    </script>
  </body>
</html>
