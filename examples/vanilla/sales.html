<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Sales</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="container">
        <section class="section">
          <div id="sales-container"><div class="spinner"></div></div>
        </section>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@spaceis/sdk@0.1.4/dist/spaceis.global.js" integrity="sha384-DJRxH7IjY+WUtTa16M0CizszmJHmweQTCNXnI6OfFN5q/Vi9ejyqQ7oZ8V1Ouokq" crossorigin="anonymous"></script>
    <script src="shared.js"></script>
    <script>
      "use strict";

      let countdownTimers = [];

      function pad(n) { return n < 10 ? `0${n}` : `${n}`; }

      async function loadSales() {
        const container = document.getElementById("sales-container");
        renderSkeletons("sales-container", 6);

        countdownTimers.forEach((t) => { clearInterval(t); });
        countdownTimers = [];

        try {
          const result = await client.sales.list({ sort: "expires_at" });
          const sales = result.data || result;

          if (!sales?.length) {
            container.innerHTML = '<div class="empty-state"><p>No active sales.</p></div>';
            return;
          }

          const grid = document.createElement("div");
          grid.className = "products-grid";

          sales.forEach((sale, idx) => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.style.animationDelay = `${idx * 0.04}s`;
            card.style.cursor = "pointer";

            const imgHtml = sale.image
              ? `<img class="product-img" src="${esc(sale.image)}" alt="${esc(sale.name)}" loading="lazy">`
              : `<div class="product-img-placeholder">${PLACEHOLDER_SVG_LG}</div>`;

            const discountHtml = sale.percentage_discount
              ? `<div class="product-discount-badge">-${esc(sale.percentage_discount)}%</div>`
              : '';

            const endsAt = sale.expires_at || sale.ends_at;
            const countdownHtml = endsAt
              ? `<div class="sale-timer" id="sale-timer-${idx}"></div>`
              : '';

            card.innerHTML =
              `<div class="product-img-wrap">${imgHtml}${discountHtml}</div>` +
              '<div class="product-body">' +
                `<div class="product-name">${esc(sale.name)}</div>` +
                '<div class="product-footer">' +
                  '<div>' +
                    (sale.percentage_discount
                      ? `<span class="product-price" style="color:var(--red)">-${esc(sale.percentage_discount)}%</span>`
                      : '') +
                  '</div>' +
                  '<button class="view-btn">View</button>' +
                '</div>' +
                countdownHtml +
              '</div>';

            card.addEventListener("click", () => {
              window.location.href = `index.html?sale=${encodeURIComponent(sale.slug || sale.uuid)}`;
            });

            grid.appendChild(card);
          });

          container.innerHTML = "";
          container.appendChild(grid);

          // Countdown timers
          sales.forEach((sale, idx) => {
            const endsAt = sale.expires_at || sale.ends_at;
            if (!endsAt) return;
            const el = document.getElementById(`sale-timer-${idx}`);
            if (!el) return;

            function update() {
              const diff = new Date(endsAt).getTime() - Date.now();
              if (diff <= 0) { el.textContent = "Ended"; el.style.color = "var(--txt-3)"; return; }
              const d = Math.floor(diff / 86400000);
              const h = Math.floor((diff % 86400000) / 3600000);
              const m = Math.floor((diff % 3600000) / 60000);
              const s = Math.floor((diff % 60000) / 1000);
              const parts = [];
              if (d > 0) parts.push(`${d}d`);
              parts.push(`${pad(h)}:${pad(m)}:${pad(s)}`);
              el.textContent = `${parts.join(" ")} left`;
            }

            update();
            countdownTimers.push(setInterval(update, 1000));
          });
        } catch {
          container.innerHTML = '<div class="empty-state"><p>Failed to load sales.</p></div>';
        }
      }

      loadSales();
    </script>
  </body>
</html>
