<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceIS SDK — Cart</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header" id="site-header"></header>

    <main>
      <div class="container cart-container">
        <!-- Loading -->
        <div id="cart-page-loading" style="padding: 60px 0">
          <div class="spinner"></div>
        </div>

        <!-- Empty -->
        <div id="cart-page-empty" style="display: none">
          <div class="empty-state">
            <div class="icon">&#128722;</div>
            <p>Your cart is empty.</p>
            <br />
            <a href="index.html" class="back-link">&#8592; Back to shop</a>
          </div>
        </div>

        <!-- Cart content -->
        <div id="cart-page-content" style="display: none">
          <h1 class="cart-section-title" id="cart-page-title">Cart</h1>

          <div class="cart-page-layout">
            <!-- LEFT: Items -->
            <div class="cart-page-items" id="cart-page-items"></div>

            <!-- RIGHT: Sidebar -->
            <div class="cart-page-sidebar">
              <!-- Discount -->
              <div id="cart-page-discount"></div>

              <!-- Summary -->
              <div class="cart-page-summary" id="cart-page-summary"></div>

              <!-- Actions -->
              <div class="cart-page-actions">
                <a href="checkout.html" class="cart-page-checkout-btn">Proceed to checkout &rarr;</a>
                <a href="index.html" class="cart-page-continue-btn">Continue shopping</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="site-cart-drawer"></div>
    <div class="toast-container" id="toast-container"></div>
    <footer id="site-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/@spaceis/sdk@0.1.4/dist/spaceis.global.js"></script>
    <script src="shared.js"></script>
    <script>
      "use strict";

      function renderCartPage() {
        var loadingEl = document.getElementById("cart-page-loading");
        var emptyEl = document.getElementById("cart-page-empty");
        var contentEl = document.getElementById("cart-page-content");
        var titleEl = document.getElementById("cart-page-title");
        var itemsEl = document.getElementById("cart-page-items");
        var summaryEl = document.getElementById("cart-page-summary");
        var discountEl = document.getElementById("cart-page-discount");

        // Show spinner only on initial load
        if (cartMgr.isLoading && !cartMgr.cart) {
          loadingEl.style.display = "";
          emptyEl.style.display = "none";
          contentEl.style.display = "none";
          return;
        }

        loadingEl.style.display = "none";

        if (cartMgr.isEmpty) {
          emptyEl.style.display = "";
          contentEl.style.display = "none";
          return;
        }

        emptyEl.style.display = "none";
        contentEl.style.display = "";

        var totalQty = cartMgr.totalQuantity;
        titleEl.textContent = "Cart (" + totalQty + ")";

        // ── Items — incremental update if same items, full rebuild otherwise ──
        var existingEls = itemsEl.querySelectorAll(".cp-item");
        var currentUuids = cartMgr.items.map(function (i) { return i.variant ? i.variant.uuid : ""; });
        var existingUuids = Array.from(existingEls).map(function (el) { return el.dataset.uuid || ""; });
        var sameItems = currentUuids.length === existingUuids.length &&
          currentUuids.every(function (uuid, i) { return uuid === existingUuids[i]; });
        var prevDiscountActive = !!contentEl.querySelector(".discount-active");
        var sameDiscount = prevDiscountActive === cartMgr.hasDiscount;

        if (sameItems && sameDiscount && existingEls.length > 0) {
          // Patch only qty + prices
          cartMgr.items.forEach(function (item, i) {
            var el = existingEls[i];
            var displayQty = SpaceIS.getItemQty(item);
            var qtyInput = el.querySelector(".qty-input");
            if (qtyInput && document.activeElement !== qtyInput) {
              qtyInput.value = displayQty;
            }
            var pricesEl = el.querySelector(".cp-item-prices");
            if (pricesEl) {
              var priceHtml = '<span class="cp-item-price">' + fp(item.final_price_value) + '</span>';
              if (item.regular_price_value !== item.final_price_value) {
                priceHtml += ' <span class="cp-item-price-old">' + fp(item.regular_price_value) + '</span>';
              }
              pricesEl.innerHTML = priceHtml;
            }
          });
        } else {
          // Full rebuild
          var html = "";
          cartMgr.items.forEach(function (item) {
            var variantUuid = item.variant ? item.variant.uuid : "";
            var imgSrc = SpaceIS.getCartItemImage(item);
            var displayQty = SpaceIS.getItemQty(item);
            var showVariant = item.variant && item.shop_product && item.variant.name !== item.shop_product.name;

            var imgHtml = imgSrc
              ? '<img class="cp-item-img" src="' + esc(imgSrc) + '" alt="">'
              : '<div class="cp-item-img cp-item-img-ph">' + PLACEHOLDER_SVG_MD + '</div>';

            var variantHtml = showVariant
              ? '<div class="cp-item-variant">' + esc(item.variant.name) + '</div>'
              : '';

            var packageHtml = item.package
              ? '<div class="cp-item-package">Package: ' + esc(item.package.name) + '</div>'
              : '';

            var priceHtml = '<span class="cp-item-price">' + fp(item.final_price_value) + '</span>';
            if (item.regular_price_value !== item.final_price_value) {
              priceHtml += ' <span class="cp-item-price-old">' + fp(item.regular_price_value) + '</span>';
            }

            html +=
              '<div class="cp-item" data-uuid="' + esc(variantUuid) + '">' +
                '<div class="cp-item-img-wrap">' + imgHtml + '</div>' +
                '<div class="cp-item-body">' +
                  '<div class="cp-item-top">' +
                    '<div class="cp-item-info">' +
                      '<div class="cp-item-name">' + esc(item.shop_product ? item.shop_product.name : '') + '</div>' +
                      variantHtml +
                      packageHtml +
                      '<div class="cp-item-prices">' + priceHtml + '</div>' +
                    '</div>' +
                    '<button class="cp-item-remove" data-uuid="' + esc(variantUuid) + '" aria-label="Remove">' +
                      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>' +
                    '</button>' +
                  '</div>' +
                  '<div class="cp-item-bottom">' +
                    '<div class="qty-stepper">' +
                      '<button class="qty-step-btn" data-action="minus" data-uuid="' + esc(variantUuid) + '"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>' +
                      '<input class="qty-input" type="text" inputmode="numeric" value="' + displayQty + '" data-uuid="' + esc(variantUuid) + '">' +
                      '<button class="qty-step-btn" data-action="plus" data-uuid="' + esc(variantUuid) + '"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>' +
                    '</div>' +
                  '</div>' +
                '</div>' +
              '</div>';
          });
          itemsEl.innerHTML = html;
        }

        // ── Discount ──
        renderDiscountSection(discountEl, {
          inputId: "cp-discount-input",
          applyId: "cp-discount-apply",
          removeId: "cp-discount-remove",
        });

        // ── Summary ──
        renderCartSummary(summaryEl);
      }

      // ── Event delegation (set ONCE) ──
      document.getElementById("cart-page-items").addEventListener("click", function (e) {
        // Try shared stepper handler first (+/- and remove via data-action)
        if (handleQtyStepperClick(e)) return;

        // Fallback: explicit remove button (.cp-item-remove) without data-action
        var removeBtn = e.target.closest(".cp-item-remove");
        if (removeBtn) {
          cartMgr.remove(removeBtn.dataset.uuid).catch(function (err) {
            showToast(getErrorMessage(err), "error");
          });
        }
      });

      // ── Manual input change ──
      document.getElementById("cart-page-items").addEventListener("change", function (e) {
        handleQtyInputChange(e);
      });

      // ── Enter key in qty input ──
      document.getElementById("cart-page-items").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && e.target.classList.contains("qty-input")) {
          e.preventDefault();
          e.target.blur();
        }
      });

      // ── Listen for cart changes ──
      cartMgr.onChange(function () {
        renderCartPage();
      });

      // ── Init ──
      renderCartPage();
    </script>
  </body>
</html>
